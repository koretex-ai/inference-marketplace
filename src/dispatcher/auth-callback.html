<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Signing you in · Koretex</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 30rem; margin: 6rem auto; padding: 0 1.25rem; line-height: 1.55; text-align: center;
  }
  .spinner { width: 2rem; height: 2rem; margin: 0 auto 1rem; border: 3px solid color-mix(in srgb, currentColor 20%, transparent);
             border-top-color: #6d3bf5; border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .msg { opacity: .72; }
  .err { color: #d23b3b; }
  a { color: #6d3bf5; }
</style>
</head>
<body>
  <div class="spinner" id="spin"></div>
  <p class="msg" id="msg">Finishing sign-in…</p>

<script src="/wallet.js"></script>
<script>
  (async () => {
    const msg = document.getElementById("msg");
    const spin = document.getElementById("spin");
    try {
      const address = await window.KoretexWallet.init(); // completes the OAuth handshake
      const back = window.KoretexWallet.consumeReturnTo();
      if (!address) throw new Error("Sign-in did not complete.");
      // Replace so the callback URL (with OAuth params) doesn't linger in history.
      location.replace(back);
    } catch (e) {
      spin.style.display = "none";
      msg.className = "msg err";
      msg.innerHTML = ((e && e.message) || "Sign-in failed.") + ' <a href="/">Go back</a>';
    }
  })();
</script>
</body>
</html>
